<!DOCTYPE html>
<html lang="en">
<head>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0b">
<title>Endurance Coach</title>
<style>
:root {
  --bg: #0a0a0b;
  --bg-card: #111113;
  --text-1: #ffffff;
  --text-2: rgba(255,255,255,0.6);
  --text-3: rgba(255,255,255,0.4);
  --text-4: rgba(255,255,255,0.25);
  --border: rgba(255,255,255,0.06);
  --border-strong: rgba(255,255,255,0.14);
  --accent: #ffffff;
  --good: #6ee7b7;
  --warn: #fbbf24;
  --bad: #ff8a8a;
  --font: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
  --font-mono: ui-monospace, SF Mono, Menlo, Consolas, monospace;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: radial-gradient(ellipse 80% 60% at 50% 0%, #14141a 0%, #0a0a0b 60%);
  color: var(--text-1);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  -webkit-text-size-adjust: 100%;
  min-height: 100vh;
  overflow-x: hidden;
  width: 100%;
  max-width: 100vw;
}
.en-shell {
  width: 100%; max-width: min(720px, 100vw);
  margin: 0 auto;
  padding: 24px 16px calc(40px + env(safe-area-inset-bottom));
  padding-top: max(24px, env(safe-area-inset-top));
  padding-right: max(16px, env(safe-area-inset-right));
  padding-left: max(16px, env(safe-area-inset-left));
  box-sizing: border-box;
}
.en-shell *, .en-shell *::before, .en-shell *::after { min-width: 0; }
img, video, canvas, svg { max-width: 100%; }

.en-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 18px;
}
.en-title { margin: 0; font-size: 27px; font-weight: 800; letter-spacing: -0.02em; }
.en-subtitle { margin-top: 6px; font-size: 13px; color: var(--text-3); }

/* ----- Sport toggle ----- */
.en-sport-toggle {
  display: flex; gap: 4px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 14px; padding: 5px;
  margin-bottom: 16px;
}
.en-sport-pill {
  flex: 1; padding: 11px; border: none; background: transparent;
  color: var(--text-2); border-radius: 10px;
  font-family: inherit; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: background 0.15s, color 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.en-sport-pill:hover { color: var(--text-1); }
.en-sport-pill.active {
  background: linear-gradient(180deg, #ffffff 0%, #e8e5dd 100%);
  color: #0a0a0b; font-weight: 800;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.5), 0 4px 12px rgba(0,0,0,0.35);
}

/* ----- Hero stats ----- */
.en-stats-row {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
  margin-bottom: 14px;
}
.en-stat-box {
  padding: 14px 10px;
  background: rgba(255,255,255,0.025);
  border: 1px solid var(--border);
  border-radius: 12px; text-align: center;
}
.en-stat-val {
  font-size: 28px; font-weight: 800; letter-spacing: -0.01em;
  font-variant-numeric: tabular-nums;
}
.en-stat-val.muted { color: var(--text-3); }
.en-stat-unit { font-size: 13px; font-weight: 600; color: var(--text-3); margin-left: 3px; }
.en-stat-label {
  margin-top: 4px;
  font-size: 10.5px; font-weight: 700; letter-spacing: 0.10em;
  text-transform: uppercase; color: var(--text-3);
}

/* ----- Card shell ----- */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 14px;
}
.en-card-title {
  display: flex; align-items: center; gap: 8px;
  margin: 0 0 14px; font-size: 14px; font-weight: 700;
}
.en-help-icon {
  width: 17px; height: 17px; border-radius: 50%;
  background: rgba(255,255,255,0.06); color: var(--text-3);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; cursor: default;
}
.en-chart-sublabel { font-size: 12px; font-weight: 500; color: var(--text-3); }

/* ----- Quick log card ----- */
.en-log-distance-row {
  display: flex; align-items: baseline; gap: 8px;
  margin-bottom: 16px; padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
}
.en-log-distance-row input[type="number"] {
  flex: 1; min-width: 0;
  font-size: 40px; font-weight: 700; letter-spacing: -0.02em;
  background: transparent; border: none; outline: none;
  color: var(--text-1); font-family: inherit;
  -moz-appearance: textfield; padding: 0;
}
.en-log-distance-row input[type="number"]::-webkit-outer-spin-button,
.en-log-distance-row input[type="number"]::-webkit-inner-spin-button {
  -webkit-appearance: none; margin: 0;
}
.en-distance-unit { font-size: 16px; font-weight: 600; color: var(--text-3); }

.en-log-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.en-field { display: flex; flex-direction: column; gap: 6px; }
.en-field label {
  font-size: 10.5px; color: var(--text-3); font-weight: 700;
  letter-spacing: 0.10em; text-transform: uppercase;
}
.en-field input {
  width: 100%; padding: 12px;
  border: 1px solid var(--border);
  background: rgba(0,0,0,0.28);
  color: var(--text-1); border-radius: 10px;
  font-family: inherit; font-size: 15px; font-weight: 600;
  -moz-appearance: textfield;
}
.en-field input::-webkit-outer-spin-button,
.en-field input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.en-field input:focus {
  outline: none; border-color: rgba(255,255,255,0.40);
  box-shadow: 0 0 0 3px rgba(255,255,255,0.06);
}
.en-date-field { margin-bottom: 12px; max-width: 180px; }
.en-date-field input { font-size: 13px; font-weight: 500; padding: 10px; }

.en-optional-toggle {
  display: inline-block; font-size: 12px; color: var(--text-3);
  cursor: pointer; margin-bottom: 4px; user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.en-optional-toggle:hover { color: var(--text-1); }
.en-optional-fields {
  display: none; grid-template-columns: 1fr 1fr; gap: 10px;
  margin-top: 10px; margin-bottom: 4px;
}
.en-optional-fields.show { display: grid; }

.en-btn-primary {
  width: 100%; padding: 14px; margin-top: 14px;
  border: 1px solid rgba(255,255,255,0.85);
  background: linear-gradient(180deg, #ffffff 0%, #e8e5dd 100%);
  color: #0a0a0b; border-radius: 12px;
  font-family: inherit; font-size: 13px; font-weight: 700;
  cursor: pointer;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.55), 0 4px 14px rgba(0,0,0,0.40);
  -webkit-tap-highlight-color: transparent;
}
.en-btn-primary:hover { transform: translateY(-1px); }
.en-btn-primary:active { transform: translateY(0) scale(0.98); }

/* ----- Next session card ----- */
.en-next-target { font-size: 28px; font-weight: 800; letter-spacing: -0.01em; }
.en-next-sub { margin-top: 6px; font-size: 12.5px; color: var(--text-3); }
.en-next-tag {
  display: inline-block; margin-top: 12px; padding: 5px 11px;
  border-radius: 999px; font-size: 11.5px; font-weight: 700;
}
.en-next-tag.warn { background: rgba(251,191,36,0.14); color: var(--warn); }
.en-next-tag.good { background: rgba(110,231,183,0.14); color: var(--good); }

/* ----- Weekly chart card ----- */
.en-chart-track-row { position: relative; height: 110px; margin-top: 4px; }
.en-chart-target-line {
  position: absolute; left: 0; right: 0; display: none;
  border-top: 1px dashed rgba(255,255,255,0.35); z-index: 2;
}
.en-chart-target-label {
  position: absolute; right: 0; top: -13px;
  font-size: 9px; color: var(--text-3); white-space: nowrap;
}
.en-chart-tracks { display: flex; gap: 6px; height: 100%; align-items: flex-end; }
.en-chart-col-track {
  flex: 1; min-width: 0; height: 100%;
  display: flex; flex-direction: column; align-items: center;
  justify-content: flex-end; gap: 4px;
}
.en-bar-val {
  font-size: 9.5px; color: var(--text-4); white-space: nowrap;
  font-variant-numeric: tabular-nums;
}
.en-bar-val.current { color: var(--text-1); font-weight: 700; }
.en-bar-fill {
  width: 65%; border-radius: 4px 4px 2px 2px;
  background: rgba(255,255,255,0.15);
  transition: height 0.2s ease;
}
.en-bar-fill.current { background: var(--accent); }
.en-chart-labels-row { display: flex; gap: 6px; margin-top: 6px; }
.en-bar-label { flex: 1; text-align: center; font-size: 9.5px; color: var(--text-4); }

/* ----- Section titles ----- */
.en-section-title {
  display: flex; align-items: center; gap: 8px;
  margin: 22px 0 10px;
  font-size: 10.5px; font-weight: 700; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--text-3);
}
.en-count-badge {
  background: rgba(255,255,255,0.06); color: var(--text-2);
  padding: 1px 8px; border-radius: 999px;
  font-size: 11px; font-weight: 700;
  font-variant-numeric: tabular-nums;
}

/* ----- History ----- */
.en-hist-card { padding: 6px 16px; }
.en-hist-row {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 0; border-bottom: 1px solid var(--border);
}
.en-hist-row:last-child { border-bottom: none; }
.en-hist-date {
  flex: none; font-size: 11px; color: var(--text-3);
  font-family: var(--font-mono); min-width: 62px;
}
.en-hist-main { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
.en-hist-detail { font-size: 14px; font-weight: 700; }
.en-hist-meta { font-size: 11.5px; color: var(--text-3); }
.en-pr-badge {
  display: inline-block; margin-left: 6px;
  background: rgba(251,191,36,0.16); color: var(--warn);
  font-size: 9px; font-weight: 800; letter-spacing: 0.06em;
  padding: 2px 6px; border-radius: 999px; vertical-align: middle;
  text-transform: uppercase;
}
.en-hist-del {
  flex: none; background: transparent; border: none; color: var(--text-4);
  font-size: 16px; cursor: pointer; padding: 4px 6px;
  -webkit-tap-highlight-color: transparent;
}
.en-hist-del:hover { color: var(--bad); }
.en-empty {
  padding: 18px 0; text-align: center; font-size: 13px; color: var(--text-3);
}

/* ----- PRs ----- */
.en-pr-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px;
}
.en-pr-cell {
  padding: 14px; background: rgba(255,255,255,0.025);
  border: 1px solid var(--border); border-radius: 12px;
}
.en-pr-dist {
  font-size: 10.5px; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--text-3); margin-bottom: 6px;
}
.en-pr-pace { font-size: 18px; font-weight: 800; font-variant-numeric: tabular-nums; }
.en-pr-pace.empty { color: var(--text-4); font-weight: 600; }
.en-pr-date { margin-top: 4px; font-size: 11px; color: var(--text-3); }

@media (max-width: 480px) {
  .en-shell { padding: 14px 10px calc(32px + env(safe-area-inset-bottom)); padding-top: max(14px, env(safe-area-inset-top)); padding-right: max(10px, env(safe-area-inset-right)); padding-left: max(10px, env(safe-area-inset-left)); }
  .en-title { font-size: 21px; }
  .card { padding: 16px 14px; }
  .en-hist-card { padding: 4px 12px; }
  .en-stat-box { padding: 12px 6px; }
  .en-stat-val { font-size: 22px; }
  .en-stat-label { font-size: 9.5px; letter-spacing: 0.06em; }
  .en-log-distance-row input[type="number"] { font-size: 32px; }
  .en-log-grid-2, .en-optional-fields { grid-template-columns: 1fr; }
  .en-chart-tracks, .en-chart-labels-row { gap: 4px; }
}
</style>
</head>
<body>
<div class="en-shell">
  <div class="en-inner">

    <div class="en-header">
      <div>
        <h1 class="en-title">Endurance</h1>
        <div class="en-subtitle" id="enSubtitle">Running</div>
      </div>
    </div>

    <div class="en-sport-toggle" id="enSportToggle">
      <button type="button" class="en-sport-pill" data-sport="run">Run</button>
      <button type="button" class="en-sport-pill" data-sport="swim">Swim</button>
    </div>

    <div class="en-stats-row">
      <div class="en-stat-box">
        <div class="en-stat-val" id="enStatVolume">0</div>
        <div class="en-stat-label">This week</div>
      </div>
      <div class="en-stat-box">
        <div class="en-stat-val" id="enStatSessions">0</div>
        <div class="en-stat-label">Sessions</div>
      </div>
      <div class="en-stat-box">
        <div class="en-stat-val" id="enStatStreak">0</div>
        <div class="en-stat-label">Streak (wks)</div>
      </div>
    </div>

    <div class="card en-log-card">
      <h2 class="en-card-title">Log session</h2>

      <div class="en-log-distance-row">
        <input type="number" id="enDistance" inputmode="decimal" min="0" step="0.1" placeholder="0" aria-label="Distance">
        <span class="en-distance-unit" id="enDistanceUnit">km</span>
      </div>

      <div class="en-log-grid-2">
        <div class="en-field">
          <label for="enDuration">Duration (min)</label>
          <input type="number" id="enDuration" inputmode="decimal" min="0" step="1" placeholder="optional">
        </div>
        <div class="en-field" id="enPaceField">
          <label for="enPace">Pace (M:SS)</label>
          <input type="text" id="enPace" placeholder="e.g. 5:40">
        </div>
        <div class="en-field" id="enPoolField" style="display:none">
          <label for="enPoolLen">Pool length (m)</label>
          <input type="number" id="enPoolLen" inputmode="decimal" min="0" step="5" placeholder="optional">
        </div>
      </div>

      <div class="en-field en-date-field">
        <label for="enDate">Date</label>
        <input type="date" id="enDate">
      </div>

      <span class="en-optional-toggle" id="enOptionalToggle">＋ Heart rate · Notes</span>
      <div class="en-optional-fields" id="enOptionalFields">
        <div class="en-field">
          <label for="enHr">Heart rate (bpm)</label>
          <input type="number" id="enHr" inputmode="numeric" min="0" step="1" placeholder="optional">
        </div>
        <div class="en-field">
          <label for="enNotes">Notes</label>
          <input type="text" id="enNotes" placeholder="optional">
        </div>
      </div>

      <button type="button" class="en-btn-primary" id="enSaveBtn">Save session</button>
    </div>

    <div class="card en-next-card">
      <h2 class="en-card-title">Next session <span class="en-help-icon" id="enHelpIcon" title="More detail coming soon">?</span></h2>
      <div class="en-next-target" id="enNextTarget">—</div>
      <div class="en-next-sub" id="enNextSub">—</div>
      <div id="enNextTag"></div>
    </div>

    <div class="card en-chart-card">
      <h2 class="en-card-title">Weekly volume <span class="en-chart-sublabel" id="enChartSportLabel">· Running</span></h2>
      <div class="en-chart-track-row">
        <div class="en-chart-target-line" id="enChartTargetLine">
          <span class="en-chart-target-label" id="enChartTargetLabel"></span>
        </div>
        <div class="en-chart-tracks" id="enChartTracks"></div>
      </div>
      <div class="en-chart-labels-row" id="enChartLabelsRow"></div>
    </div>

    <div class="en-section-title">Sessions <span class="en-count-badge" id="enHistCount">0</span></div>
    <div class="card en-hist-card" id="enHistList"></div>

    <div class="en-section-title">Personal records</div>
    <div class="card en-pr-card">
      <div class="en-pr-grid" id="enPrGrid"></div>
    </div>

  </div>
</div>

<script>
(function () {
  'use strict';

  // ============================================================
  // STORAGE SEAMS
  // ============================================================
  const LOGS_KEY = 'po_endurance_logs_v1';
  const CONFIG_KEY = 'po_endurance_config_v1';

  function getLogs() {
    try { return JSON.parse(localStorage.getItem(LOGS_KEY)) || []; }
    catch (e) { return []; }
  }
  function setLogs(arr) { localStorage.setItem(LOGS_KEY, JSON.stringify(arr)); }

  function getConfig() {
    const defaults = {
      activeSport: 'run',
      progressionRate: 0.07,
      runPRDistances: [1, 5, 10, 21.1, 42.2],
      swimPRDistances: [100, 400, 1000, 1500]
    };
    try {
      const stored = JSON.parse(localStorage.getItem(CONFIG_KEY));
      return stored ? Object.assign({}, defaults, stored) : defaults;
    } catch (e) { return defaults; }
  }
  function setConfig(obj) { localStorage.setItem(CONFIG_KEY, JSON.stringify(obj)); }

  // ============================================================
  // COMPUTATION LAYER — pure functions, no DOM reads
  // ============================================================
  function dateKey(d) {
    return d.getFullYear() + '-' +
      String(d.getMonth() + 1).padStart(2, '0') + '-' +
      String(d.getDate()).padStart(2, '0');
  }
  function mondayOf(d) {
    const dt = new Date(d); const day = dt.getDay();
    dt.setDate(dt.getDate() + (day === 0 ? -6 : 1 - day));
    dt.setHours(0, 0, 0, 0); return dt;
  }
  function weekStart(weeksAgo) {
    const d = mondayOf(new Date());
    d.setDate(d.getDate() - weeksAgo * 7); return d;
  }
  function weekEnd(start) {
    const d = new Date(start); d.setDate(d.getDate() + 6);
    d.setHours(23, 59, 59, 999); return d;
  }
  function inRange(dateStr, start, end) {
    const d = new Date(dateStr + 'T00:00:00');
    return d >= start && d <= end;
  }

  function weeklyVolume(logs, sport, weeksAgo) {
    const s = weekStart(weeksAgo), e = weekEnd(s);
    return logs
      .filter(l => l.sport === sport && inRange(l.date, s, e))
      .reduce((sum, l) => sum + (Number(l.distance) || 0), 0);
  }

  function rollingAvg(logs, sport) {
    const vols = [1, 2, 3, 4].map(w => weeklyVolume(logs, sport, w));
    const nonZero = vols.filter(v => v > 0);
    return nonZero.length ? nonZero.reduce((a, b) => a + b, 0) / nonZero.length : 0;
  }

  function nextTarget(logs, sport) {
    const DEFAULTS = { run: 10, swim: 2000 };
    const avg = rollingAvg(logs, sport);
    if (avg === 0) return DEFAULTS[sport];
    const cfg = getConfig();
    const proposed = avg * (1 + cfg.progressionRate);
    const lastWeek = weeklyVolume(logs, sport, 1);
    if (lastWeek === 0) return Math.round(avg * 0.6 * 10) / 10; // deload
    const maxIncrease = avg * 1.10;
    const target = Math.min(proposed, maxIncrease);
    return sport === 'swim' ? Math.round(target / 50) * 50 : Math.round(target * 10) / 10;
  }

  // Streak counts weeks (not days) — more meaningful for endurance training
  // where 1 session/week is the minimum consistency signal.
  function currentStreak(logs, sport) {
    let streak = 0, weeksAgo = 0;
    while (weeksAgo < 52) {
      if (weeklyVolume(logs, sport, weeksAgo) > 0) { streak++; weeksAgo++; }
      else { if (weeksAgo === 0) { weeksAgo++; continue; } break; }
    }
    return streak;
  }

  function parsePaceSeconds(paceStr) {
    if (!paceStr) return null;
    const m = String(paceStr).match(/^(\d+):(\d{2})$/);
    return m ? parseInt(m[1]) * 60 + parseInt(m[2]) : null;
  }
  function computedPace(log) {
    const stored = parsePaceSeconds(log.pace);
    if (stored) return stored;
    if (log.duration && log.distance && log.distance > 0) {
      const durMin = Number(log.duration);
      const dist = Number(log.distance);
      if (log.sport === 'swim') return (durMin / dist) * 100 * 60; // seconds per 100m
      return (durMin / dist) * 60; // seconds per km
    }
    return null;
  }
  function detectPRs(logs, sport) {
    const cfg = getConfig();
    const distances = sport === 'run' ? cfg.runPRDistances : cfg.swimPRDistances;
    const prs = new Map();
    const sportLogs = logs.filter(l => l.sport === sport);
    for (const dist of distances) {
      const tolerance = dist * 0.05;
      const candidates = sportLogs.filter(l =>
        Math.abs(Number(l.distance) - dist) <= tolerance && computedPace(l) !== null
      );
      if (!candidates.length) continue;
      candidates.sort((a, b) => computedPace(a) - computedPace(b));
      prs.set(dist, { log: candidates[0], paceSeconds: computedPace(candidates[0]) });
    }
    return prs;
  }
  function formatPace(seconds, sport) {
    if (!seconds) return '—';
    const m = Math.floor(seconds / 60), s = Math.round(seconds % 60);
    return m + ':' + String(s).padStart(2, '0') + (sport === 'swim' ? '/100m' : '/km');
  }

  function sessionsThisWeek(logs, sport) {
    const s = weekStart(0), e = weekEnd(s);
    return logs.filter(l => l.sport === sport && inRange(l.date, s, e))
      .sort((a, b) => b.date.localeCompare(a.date) || b.loggedAt - a.loggedAt);
  }
  function allSessions(logs, sport) {
    return logs.filter(l => l.sport === sport)
      .sort((a, b) => b.date.localeCompare(a.date) || b.loggedAt - a.loggedAt);
  }

  // 4-week rolling average uses PAST weeks (not including the current one)
  // so today's logging doesn't alter tonight's target — the target stays
  // stable for the whole week.
  function weeklyVolumeHistory(logs, sport) {
    return Array.from({ length: 8 }, (_, i) => {
      const weeksAgo = 7 - i;
      const mon = mondayOf(new Date()); mon.setDate(mon.getDate() - weeksAgo * 7);
      const label = weeksAgo === 0 ? 'This wk' : (mon.getMonth() + 1) + '/' + mon.getDate();
      return { label, vol: weeklyVolume(logs, sport, weeksAgo), isCurrent: weeksAgo === 0 };
    });
  }

  function unitFor(sport) { return sport === 'run' ? 'km' : 'm'; }
  function formatVolume(v, sport) {
    return sport === 'run' ? v.toFixed(1) + ' km' : Math.round(v).toLocaleString() + ' m';
  }

  // ============================================================
  // RENDER
  // ============================================================
  function renderStats(thisWeekVol, sessionCount, streak, sport) {
    const volEl = document.getElementById('enStatVolume');
    const volText = sport === 'run' ? thisWeekVol.toFixed(1) : Math.round(thisWeekVol).toLocaleString();
    volEl.innerHTML = volText + '<span class="en-stat-unit">' + unitFor(sport) + '</span>';
    volEl.classList.toggle('muted', thisWeekVol === 0);
    document.getElementById('enStatSessions').textContent = sessionCount;
    document.getElementById('enStatStreak').textContent = streak;
  }

  function renderNext(target, avg, lastWk, thisWeekVol, sport) {
    document.getElementById('enNextTarget').textContent = 'Target: ' + formatVolume(target, sport);

    let sub;
    if (avg > 0) {
      sub = 'Based on your 4-week average (' + formatVolume(avg, sport) + '/wk)';
    } else {
      sub = 'Default starting target';
    }
    document.getElementById('enNextSub').textContent = sub;

    let tagHtml = '';
    if (avg > 0 && lastWk === 0) {
      tagHtml = '<span class="en-next-tag warn">Deload week — easing back in</span>';
    } else if (target > 0 && thisWeekVol >= target) {
      tagHtml = '<span class="en-next-tag good">Target reached this week ✓</span>';
    }
    document.getElementById('enNextTag').innerHTML = tagHtml;
  }

  function renderChart(logs, sport, target, avg) {
    const data = weeklyVolumeHistory(logs, sport);
    const maxVol = Math.max(1, ...data.map(d => d.vol));
    const chartMax = avg > 0 ? Math.max(maxVol, target) : maxVol;

    document.getElementById('enChartTracks').innerHTML = data.map(d => {
      const h = chartMax > 0 ? (d.vol / chartMax * 100) : 0;
      const valText = sport === 'run' ? d.vol.toFixed(1) : Math.round(d.vol).toLocaleString();
      return '<div class="en-chart-col-track">' +
        '<span class="en-bar-val' + (d.isCurrent ? ' current' : '') + '">' + valText + '</span>' +
        '<div class="en-bar-fill' + (d.isCurrent ? ' current' : '') + '" style="height:' + h.toFixed(1) + '%"></div>' +
      '</div>';
    }).join('');

    document.getElementById('enChartLabelsRow').innerHTML = data.map(d =>
      '<span class="en-bar-label">' + d.label + '</span>'
    ).join('');

    const lineEl = document.getElementById('enChartTargetLine');
    if (avg > 0 && chartMax > 0) {
      const pct = Math.min(100, (target / chartMax) * 100);
      lineEl.style.bottom = pct + '%';
      lineEl.style.display = 'block';
      document.getElementById('enChartTargetLabel').textContent = 'Target';
    } else {
      lineEl.style.display = 'none';
    }
  }

  function renderHistory(logs, sport) {
    const sessions = allSessions(logs, sport);
    const prs = detectPRs(logs, sport);
    const prLogIds = new Set(Array.from(prs.values()).map(e => e.log.id));

    document.getElementById('enHistCount').textContent = sessions.length;
    const listEl = document.getElementById('enHistList');

    if (!sessions.length) {
      listEl.innerHTML = '<div class="en-empty">No ' + (sport === 'run' ? 'runs' : 'swims') +
        ' logged yet. Log your first session above.</div>';
      return;
    }

    listEl.innerHTML = sessions.map(l => {
      const distText = sport === 'run'
        ? Number(l.distance).toFixed(1) + ' km'
        : Math.round(l.distance).toLocaleString() + ' m';
      const paceSec = computedPace(l);
      const metaParts = [];
      if (paceSec) metaParts.push(formatPace(paceSec, sport));
      if (l.duration) metaParts.push(l.duration + ' min');
      const metaText = metaParts.join(' · ');
      const prBadge = prLogIds.has(l.id) ? '<span class="en-pr-badge">PR</span>' : '';
      return '<div class="en-hist-row">' +
        '<span class="en-hist-date">' + l.date + '</span>' +
        '<div class="en-hist-main">' +
          '<span class="en-hist-detail">' + distText + prBadge + '</span>' +
          (metaText ? '<span class="en-hist-meta">' + metaText + '</span>' : '') +
        '</div>' +
        '<button type="button" class="en-hist-del" data-del="' + l.id + '" aria-label="Delete">×</button>' +
      '</div>';
    }).join('');

    listEl.querySelectorAll('[data-del]').forEach(btn =>
      btn.addEventListener('click', () => {
        setLogs(getLogs().filter(l => l.id !== btn.dataset.del));
        render();
      })
    );
  }

  function renderPRs(logs, sport) {
    const cfg = getConfig();
    const distances = sport === 'run' ? cfg.runPRDistances : cfg.swimPRDistances;
    const prs = detectPRs(logs, sport);

    document.getElementById('enPrGrid').innerHTML = distances.map(dist => {
      const distLabel = sport === 'run' ? dist + ' km' : dist + ' m';
      const entry = prs.get(dist);
      if (!entry) {
        return '<div class="en-pr-cell"><div class="en-pr-dist">' + distLabel + '</div>' +
          '<div class="en-pr-pace empty">—</div></div>';
      }
      return '<div class="en-pr-cell"><div class="en-pr-dist">' + distLabel + '</div>' +
        '<div class="en-pr-pace">' + formatPace(entry.paceSeconds, sport) + '</div>' +
        '<div class="en-pr-date">' + entry.log.date + '</div></div>';
    }).join('');
  }

  function render() {
    const logs = getLogs();
    const cfg = getConfig();
    const sport = cfg.activeSport;

    document.querySelectorAll('#enSportToggle .en-sport-pill').forEach(btn =>
      btn.classList.toggle('active', btn.dataset.sport === sport)
    );
    document.getElementById('enSubtitle').textContent = sport === 'run' ? 'Running' : 'Swimming';
    document.getElementById('enDistanceUnit').textContent = unitFor(sport);
    document.getElementById('enPaceField').style.display = sport === 'run' ? '' : 'none';
    document.getElementById('enPoolField').style.display = sport === 'swim' ? '' : 'none';
    document.getElementById('enChartSportLabel').textContent = '· ' + (sport === 'run' ? 'Running' : 'Swimming');

    const thisWeekSessions = sessionsThisWeek(logs, sport);
    const thisWeekVol = thisWeekSessions.reduce((s, l) => s + (Number(l.distance) || 0), 0);
    const sessionCount = thisWeekSessions.length;
    const streak = currentStreak(logs, sport);
    const target = nextTarget(logs, sport);
    const avg = rollingAvg(logs, sport);
    const lastWk = weeklyVolume(logs, sport, 1);

    renderStats(thisWeekVol, sessionCount, streak, sport);
    renderNext(target, avg, lastWk, thisWeekVol, sport);
    renderChart(logs, sport, target, avg);
    renderHistory(logs, sport);
    renderPRs(logs, sport);
  }

  // ============================================================
  // EVENTS
  // ============================================================
  document.querySelectorAll('#enSportToggle .en-sport-pill').forEach(btn => {
    btn.addEventListener('click', () => {
      const cfg = getConfig();
      cfg.activeSport = btn.dataset.sport;
      setConfig(cfg);
      render();
    });
  });

  document.getElementById('enOptionalToggle').addEventListener('click', () => {
    document.getElementById('enOptionalFields').classList.toggle('show');
  });

  // The `type` sub-field (Endurance/Intervals/Technique etc.) has been
  // removed. Session-first design tracks raw sessions, not prescribed
  // types. Old logs that have `type` still render — the field is simply
  // ignored everywhere above.
  document.getElementById('enSaveBtn').addEventListener('click', () => {
    const cfg = getConfig();
    const sport = cfg.activeSport;

    const distance = parseFloat(document.getElementById('enDistance').value);
    if (!distance || distance <= 0) return;

    const duration = parseFloat(document.getElementById('enDuration').value);
    const date = document.getElementById('enDate').value || dateKey(new Date());
    const hrVal = parseFloat(document.getElementById('enHr').value);
    let notes = document.getElementById('enNotes').value.trim();
    let pace = null;

    if (sport === 'run') {
      pace = document.getElementById('enPace').value.trim() || null;
    } else {
      // `pool` field removed from the schema. Not enough utility to justify
      // the UX complexity of a dedicated column — folded into notes instead.
      const poolLen = parseFloat(document.getElementById('enPoolLen').value);
      if (poolLen) notes = 'Pool: ' + poolLen + 'm' + (notes ? ' · ' + notes : '');
    }

    const logs = getLogs();
    logs.push({
      id: 'log_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7),
      date, sport, distance,
      duration: isNaN(duration) ? null : duration,
      pace,
      hr: isNaN(hrVal) ? null : hrVal,
      notes: notes || null,
      loggedAt: Date.now()
    });
    setLogs(logs);

    document.getElementById('enDistance').value = '';
    document.getElementById('enDuration').value = '';
    document.getElementById('enPace').value = '';
    document.getElementById('enPoolLen').value = '';
    document.getElementById('enHr').value = '';
    document.getElementById('enNotes').value = '';
    document.getElementById('enOptionalFields').classList.remove('show');

    render();
  });

  document.getElementById('enDate').value = dateKey(new Date());

  render();

  // initCloudSync is defined by sync.js, which loads with `defer` — its
  // global isn't available yet while this inline script runs during the
  // initial parse, so the call waits for DOMContentLoaded (fires after
  // deferred scripts have run).
  document.addEventListener('DOMContentLoaded', function () {
    if (typeof initCloudSync !== 'function') return;
    initCloudSync({
      appKey: 'endurance',
      syncedKeys: [LOGS_KEY, CONFIG_KEY],
      onApplied: render
    });
  });
})();
</script>
</body>
</html>
