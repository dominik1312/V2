<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nova Lite · AI Mentor</title>
<!-- ============================================================
 * NOVA LITE — a simple, drop-in AI mentor for ANY dashboard.
 * Single self-contained file. No backend, no build step.
 *
 * HOW IT WORKS (bring-your-own-key):
 *   • The viewer pastes their OWN Anthropic API key (stored only in
 *     their browser's localStorage — never sent anywhere but Anthropic).
 *   • Nova reads whatever the dashboard saved in localStorage for context.
 *   • Calls the Claude API directly from the browser using the
 *     `anthropic-dangerous-direct-browser-access` header.
 *
 * This is the lightweight version: a flat CSS orb (no 3D), basic chat.
 * The premium build (3D avatar, Spark voice scheduler, secure server
 * proxy, palettes) is the paid Patreon episode.
 * ============================================================ -->
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --accent: #6EE7B7; --accent-2: #67E8F9; --bg: #05060c; --fg: #e9ecf5; --muted: rgba(233,236,245,.55); --line: rgba(255,255,255,.1); }
html, body { background: var(--bg); }
body { font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; color: var(--fg); min-height: 100vh; }

.wrap { max-width: 560px; margin: 0 auto; padding: 28px 18px 60px; }
.top { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
.key-toggle { margin-left: auto; border: 1px solid var(--line); background: rgba(255,255,255,.03); border-radius: 10px; padding: 7px 10px; cursor: pointer; font-size: 15px; line-height: 1; opacity: .55; transition: opacity .15s; }
.key-toggle:hover { opacity: 1; }
.key-toggle.has-key { opacity: 1; border-color: var(--accent); }
.keypanel { display: none; }
.keypanel.open { display: block; }

/* ---- flat CSS orb avatar (lightweight, no Three.js) ---- */
.orb { width: 60px; height: 60px; border-radius: 50%; position: relative; flex-shrink: 0;
  background: radial-gradient(circle at 32% 28%, #eafff6, var(--accent) 42%, #1f8f66 100%);
  box-shadow: 0 0 22px -2px var(--accent), inset 0 -6px 14px rgba(0,0,0,.25);
  animation: orbFloat 4s ease-in-out infinite; }
.orb::before, .orb::after { content: ''; position: absolute; top: 38%; width: 9px; height: 9px; border-radius: 50%;
  background: #06281d; box-shadow: 0 0 6px rgba(0,0,0,.4); transition: height .15s; }
.orb::before { left: 30%; } .orb::after { right: 30%; }
.orb.think { animation: orbFloat 1.1s ease-in-out infinite, orbPulse 1.1s ease-in-out infinite; }
.orb.happy::before, .orb.happy::after { height: 4px; border-radius: 0 0 9px 9px; }
@keyframes orbFloat { 0%,100% { transform: translateY(0) } 50% { transform: translateY(-6px) } }
@keyframes orbPulse { 0%,100% { box-shadow: 0 0 22px -2px var(--accent) } 50% { box-shadow: 0 0 34px 2px var(--accent) } }

.title h1 { font-family: 'Times New Roman', Georgia, serif; font-style: italic; font-size: 26px; font-weight: 500;
  background: linear-gradient(90deg, var(--accent-2), var(--accent)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.title .role { font-family: ui-monospace, monospace; font-size: 10px; letter-spacing: .24em; text-transform: uppercase; color: var(--muted); margin-top: 3px; }

/* ---- key setup ---- */
.keybar { display: flex; gap: 8px; margin-bottom: 16px; }
.keybar input { flex: 1; background: rgba(255,255,255,.03); border: 1px solid var(--line); color: var(--fg); border-radius: 10px; padding: 11px 13px; font-size: 13px; outline: none; }
.keybar input:focus { border-color: var(--accent); }
.keybar button { border: 0; border-radius: 10px; padding: 0 16px; cursor: pointer; color: #04140d; background: var(--accent); font-weight: 600; font-size: 13px; }
.hint { font-size: 12px; color: var(--muted); line-height: 1.5; margin-bottom: 18px; }
.hint a { color: var(--accent-2); }
.hint.saved { color: var(--accent); }

/* ---- chat ---- */
.feed { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }
.msg { max-width: 90%; }
.msg.user { align-self: flex-end; }
.msg.coach { align-self: flex-start; width: 100%; }
.bubble { border-radius: 14px; padding: 13px 15px; font-size: 14.5px; line-height: 1.55; }
.msg.user .bubble { background: rgba(255,255,255,.05); border: 1px solid var(--line); }
.msg.coach .bubble { background: rgba(255,255,255,.04); border: 1px solid color-mix(in srgb, var(--accent) 40%, transparent); border-left: 3px solid var(--accent); }
.tag { display: inline-block; margin-bottom: 9px; font-family: ui-monospace, monospace; font-size: 9.5px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: #04140d; background: var(--accent); padding: 3px 9px; border-radius: 999px; }
.bubble b, .pill { color: var(--accent); font-weight: 700; }
.pill { background: color-mix(in srgb, var(--accent) 18%, transparent); padding: 1px 7px; border-radius: 6px; font-weight: 600; }
.reply-list { margin: 6px 0 0; padding-left: 18px; display: grid; gap: 6px; }
.reply-list li { line-height: 1.45; }
.dots { display: inline-flex; gap: 5px; } .dots i { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); opacity: .4; animation: d 1.2s ease-in-out infinite; }
.dots i:nth-child(2){animation-delay:.2s} .dots i:nth-child(3){animation-delay:.4s}
@keyframes d { 0%,100%{opacity:.35;transform:scale(1)} 50%{opacity:1;transform:scale(1.4)} }

.composer { display: flex; gap: 9px; }
.composer input { flex: 1; background: rgba(255,255,255,.03); border: 1px solid var(--line); color: var(--fg); border-radius: 12px; padding: 13px 15px; font-size: 14.5px; outline: none; }
.composer input:focus { border-color: var(--accent); }
.composer button { width: 50px; border: 0; border-radius: 12px; cursor: pointer; color: #04140d; background: var(--accent); font-size: 18px; }
.composer button:active { transform: scale(.94); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="orb" id="orb"></div>
      <div class="title"><h1>Nova Lite</h1><div class="role">your mentor</div></div>
      <button id="keyToggle" class="key-toggle" aria-label="API key settings" title="API key">🔑</button>
    </div>

    <div class="keypanel" id="keypanel">
      <div class="keybar">
        <input id="keyInput" type="password" placeholder="paste your Anthropic API key (sk-ant-…)" autocomplete="off" />
        <button id="keySave">Save</button>
      </div>
      <div class="hint" id="hint">
        Your key is stored only in <b>this browser</b> and sent straight to Anthropic — never to us.
        Get one at <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noopener">console.anthropic.com</a>.
      </div>
    </div>

    <div class="feed" id="feed"></div>

    <div class="composer">
      <input id="chatInput" placeholder="ask Nova anything…" autocomplete="off" />
      <button id="send" aria-label="Send">→</button>
    </div>
  </div>

<script>
(function(){
  const KEY_LS = 'nova_lite_api_key';
  const feed = document.getElementById('feed');
  const input = document.getElementById('chatInput');
  const orb = document.getElementById('orb');
  const keyInput = document.getElementById('keyInput');
  const hint = document.getElementById('hint');
  const keypanel = document.getElementById('keypanel');
  const keyToggle = document.getElementById('keyToggle');
  keyToggle.addEventListener('click', () => keypanel.classList.toggle('open'));

  // ---- date + read helpers (mirror the exact key formats the source
  // pages use, so this briefing agrees with what those pages show) ----
  function calDateKey(d){ d=d||new Date();
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
  function activeDateKey(){ const n=new Date(); if(n.getHours()<6) n.setDate(n.getDate()-1); return calDateKey(n); }
  function lsGet(k){ try { return JSON.parse(localStorage.getItem(k)); } catch(e){ return null; } }

  function esc(s){ return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
  function setOrb(s){ orb.className = 'orb' + (s ? ' ' + s : ''); }

  // ---- key handling ----
  function savedKey(){ try { return localStorage.getItem(KEY_LS) || ''; } catch(e){ return ''; } }
  if (savedKey()) { hint.classList.add('saved'); hint.innerHTML = '✓ Key saved in this browser. Ask away.'; keyInput.placeholder = '•••• key saved ••••'; keyToggle.classList.add('has-key'); }
  document.getElementById('keySave').addEventListener('click', () => {
    const k = keyInput.value.trim();
    if (!k) return;
    try { localStorage.setItem(KEY_LS, k); } catch(e){}
    keyInput.value = ''; keyInput.placeholder = '•••• key saved ••••';
    hint.classList.add('saved'); hint.innerHTML = '✓ Key saved in this browser. Ask away.';
    keyToggle.classList.add('has-key');
    keypanel.classList.remove('open'); // tuck it away so it's not on screen
  });

  // ---- component calculators — copy the Score page's exact logic so
  // Nova's numbers agree with what the user sees there. Each is
  // null-safe: missing/malformed data just yields null, never throws. ----

  // Training: % of last 7 days with a workout marked done
  function trainingPct(){
    const done = lsGet('po_coach_workout_done') || {};
    if (!done || !Object.keys(done).length) return null;
    let c=0, base=new Date();
    for(let i=0;i<7;i++){ const d=new Date(base); d.setDate(base.getDate()-i); if(done[calDateKey(d)]) c++; }
    return Math.round(c/7*100);
  }
  // Supplements: % of today's stack taken (6 AM rollover)
  function supplementsPct(){
    const items = lsGet('stack:items') || [];
    if (!Array.isArray(items) || !items.length) return null;
    const taken = lsGet('stack:taken:'+activeDateKey()) || {};
    const n = items.filter(i => i && taken[i.id]).length;
    return Math.round(n/items.length*100);
  }
  // Sleep: last night's hours vs 8h target
  function sleepInfo(){
    const all = lsGet('po_sleep_v1') || {};
    const e = all[calDateKey()];
    if (!e || typeof e.hours!=='number') return { hours:null, pct:null };
    return { hours:e.hours, pct: Math.round(Math.min(100,Math.max(0,e.hours/8*100))) };
  }
  // Water: today's logged units vs computed target (mirror topbar/score formula)
  function waterPct(){
    const s = lsGet('po_water_v1'); if(!s) return null;
    const done = (s.logs||{})[calDateKey()] || 0;
    const p = s.profile || { weightKg:75 };
    const wKg = s.weightUnit==='lb' ? (p.weightKg||0)/2.20462 : (p.weightKg||0);
    const base = wKg*35;
    const exercise = (p.activityHrsPerWeek||0)/7*500;
    const caffeine = Math.max(0,(s.caffeineMgPerDay||0)-200)*1.5;
    const subs = (s.substances||[]).reduce((a,x)=>{ const dose=(x&&x.dose!=null?x.dose:(x&&x.defaultDose))||0; return a+Math.max(0,dose*((x&&x.mlPerUnit)||0)); },0);
    let adj=0; if(p.sex==='m') adj+=200; if((p.age||0)>=50) adj+=100;
    const totalMl = base+exercise+caffeine+subs+adj;
    let unitVol = s.unit==='glass'?(s.glassMl||250):s.unit==='oz'?30:s.unit==='ml'?1:(s.bottleMl||500);
    const target = Math.max(1, Math.ceil(totalMl/unitVol));
    return Math.round(Math.min(100, done/target*100));
  }
  // Health score: weighted 40/30/20/10, renormalized over available parts
  function healthScore(){
    const parts = { training:trainingPct(), supplements:supplementsPct(), water:waterPct(), sleep:sleepInfo().pct };
    const W = { training:40, supplements:30, water:20, sleep:10 };
    let ws=0, ss=0;
    Object.keys(W).forEach(k=>{ if(parts[k]!=null){ ws+=W[k]; ss+=W[k]*parts[k]; } });
    return { score: ws>0 ? Math.round(ss/ws) : null, parts };
  }
  // Goals: today's completion (6 AM rollover, key 'goals:YYYY-MM-DD')
  function goalsInfo(){
    const g = lsGet('goals:'+activeDateKey()) || [];
    if (!Array.isArray(g) || !g.length) return { done:0, total:0, pct:null };
    const done = g.filter(x=>x&&x.done).length;
    return { done, total:g.length, pct: Math.round(done/g.length*100) };
  }
  // Habits: today's completion (key 'habits:items' + 'habits:done:YYYY-MM-DD')
  function habitsInfo(){
    const items = lsGet('habits:items') || [];
    if (!Array.isArray(items) || !items.length) return { done:0, total:0, pct:null };
    const done = lsGet('habits:done:'+calDateKey()) || {};
    const n = items.filter(h=>h&&done[h.id]).length;
    return { done:n, total:items.length, pct: Math.round(n/items.length*100) };
  }
  // Weight: latest entry + 7-day delta from gym data (read-only)
  function weightInfo(){
    let arr = lsGet('po_coach_weights') || [];
    if (!Array.isArray(arr) || !arr.length) return null;
    arr = arr.filter(e=>e&&e.dateKey&&typeof e.weight==='number').sort((a,b)=>a.dateKey.localeCompare(b.dateKey));
    if (!arr.length) return null;
    const unit = (lsGet('po_coach_v1')||{}).units || 'kg';
    const latest = arr[arr.length-1];
    const cutoff = calDateKey(new Date(Date.now()-7*86400000));
    const base = arr.find(e=>e.dateKey>=cutoff) || arr[0];
    return { weight:latest.weight, unit, delta7d: +(latest.weight-base.weight).toFixed(1) };
  }
  // Finance: net worth + counts (amounts stored in CHF on the finance page)
  function financeInfo(){
    let nw=0; const cats=['bank','stocks','crypto','other'];
    cats.forEach(c=>{ (lsGet('nw:'+c)||[]).forEach(it=>{ nw += Number(it.amount)||0; }); });
    const subs = lsGet('subs') || [];
    const orders = lsGet('incoming_orders') || [];
    const wishlist = lsGet('wishlist') || [];
    return { netWorthCHF: Math.round(nw), displayCurrency: lsGet('nw_currency')||'CHF',
             subscriptionCount: subs.length, openOrderCount: orders.length, wishlistCount: wishlist.length };
  }

  // ---- trimmed raw fallback — everything in localStorage NOT already
  // covered by a calculator above, so nothing is lost even though it
  // isn't (yet) shaped into the structured briefing. ----
  function rawFallback(){
    const exact = new Set([KEY_LS, 'po_coach_workout_done','stack:items','po_sleep_v1','po_water_v1',
      'habits:items','po_coach_weights','po_coach_v1','nw:bank','nw:stocks','nw:crypto','nw:other',
      'subs','incoming_orders','wishlist','nw_currency']);
    const prefixes = ['stack:taken:','goals:','habits:done:'];
    const out = {};
    for (let i = 0; i < localStorage.length; i++){
      const k = localStorage.key(i);
      if (!k || exact.has(k) || prefixes.some(p => k.indexOf(p) === 0)) continue;
      try { out[k] = JSON.parse(localStorage.getItem(k)); } catch(e){ out[k] = localStorage.getItem(k); }
    }
    return out;
  }

  // ---- build the shaped briefing Nova actually reads ----
  function buildBriefing(){
    const hs = healthScore();
    return {
      date: calDateKey(),
      healthScoreToday: hs.score,
      components: {
        training:    { weeklyPct: hs.parts.training },
        supplements: { todayPct: hs.parts.supplements },
        water:       { todayPct: hs.parts.water },
        sleep:       { lastNightHours: sleepInfo().hours, pct: hs.parts.sleep }
      },
      goalsToday: goalsInfo(),
      habitsToday: habitsInfo(),
      bodyWeight: weightInfo(),
      finance: financeInfo(),
      raw: rawFallback()
    };
  }

  // ---- render: bullets + **pills** ----
  function inlineMarks(s){ return esc(s).replace(/\*\*(.+?)\*\*/g, '<span class="pill">$1</span>'); }
  function render(text){
    const lines = String(text).split(/\r?\n/).map(l => l.trim()).filter(Boolean);
    const items = [], loose = [];
    for (const l of lines){
      if (/^[-•*]\s+/.test(l)) items.push('<li>' + inlineMarks(l.replace(/^[-•*]\s+/, '')) + '</li>');
      else loose.push(inlineMarks(l));
    }
    let html = loose.join('<br>');
    if (items.length) html += (html ? '<br>' : '') + '<ul class="reply-list">' + items.join('') + '</ul>';
    return html;
  }
  function addUser(t){ const e = document.createElement('div'); e.className = 'msg user'; e.innerHTML = '<div class="bubble">' + esc(t) + '</div>'; feed.appendChild(e); scroll(); }
  function addCoach(html){ const e = document.createElement('div'); e.className = 'msg coach'; e.innerHTML = '<div class="bubble"><span class="tag">Nova</span><div>' + html + '</div></div>'; feed.appendChild(e); scroll(); return e; }
  function scroll(){ window.scrollTo(0, document.body.scrollHeight); }

  const SYS =
    "You are Nova, a personal mentor inside the user's life-tracking dashboard. " +
    "You can see a structured daily briefing of their health, habits, goals, body " +
    "weight and finances. Give honest, specific, encouraging guidance grounded in " +
    "their real numbers — quote the actual figures. If a value is null it means not " +
    "logged today; gently note that instead of inventing data.\n\n" +
    "Notes on the data: healthScoreToday is 0-100 (weighted training 40 / supplements " +
    "30 / water 20 / sleep 10, renormalized over whatever was logged). Component pct " +
    "values are 0-100. bodyWeight.delta7d is change over ~7 days in the user's unit. " +
    "finance.netWorthCHF is in CHF. The 'raw' field is a catch-all of any other saved " +
    "data not yet shaped above — treat it as secondary context, don't duplicate the " +
    "structured numbers from it.\n\n" +
    "Format: short bullets starting with '- ', few words each, plain language. Wrap key " +
    "words and numbers in **double asterisks**. End with one '- Do today:' bullet giving " +
    "the single highest-leverage action.\n\n" +
    "Daily briefing (JSON):\n";

  let busy = false;
  async function ask(text){
    text = (text||'').trim(); if (!text || busy) return;
    const key = savedKey();
    if (!key){ addCoach('- Paste your **Anthropic API key** above first, then ask me again.'); return; }
    busy = true; addUser(text); input.value = '';
    setOrb('think');
    const loading = addCoach('<span class="dots"><i></i><i></i><i></i></span>');
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'content-type': 'application/json',
          'x-api-key': key,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-opus-4-8',
          max_tokens: 1024,
          system: SYS + JSON.stringify(buildBriefing()),
          messages: [{ role: 'user', content: text }],
        }),
      });
      const json = await res.json();
      if (json.error){ loading.querySelector('div:last-child').innerHTML = render('- ' + (json.error.message || 'Something went wrong — check your API key.')); setOrb(''); busy = false; return; }
      const reply = (json.content && json.content[0] && json.content[0].text) || 'Hmm, no reply.';
      loading.querySelector('div:last-child').innerHTML = render(reply);
      setOrb('happy'); setTimeout(() => setOrb(''), 2500);
    } catch(e){
      loading.querySelector('div:last-child').innerHTML = render('- Could not reach Anthropic — check your connection and key.');
      setOrb('');
    }
    busy = false;
  }

  document.getElementById('send').addEventListener('click', () => ask(input.value));
  input.addEventListener('keydown', e => { if (e.key === 'Enter') ask(input.value); });

  addCoach('Hey — I am <b>Nova</b>. Paste your key above, then ask me about food, training, sleep, or where to start. I keep it short and give you <b>one thing to act on</b>.');
})();
</script>
</body>
</html>
